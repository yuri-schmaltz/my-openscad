name: Addon Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build addon zip
        run: python scripts/package_addon.py --clean

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(python - << 'PY'
          from pathlib import Path
          import tomllib
          p = Path('blender_openscad_addon/blender_manifest.toml')
          data = tomllib.loads(p.read_text(encoding='utf-8'))
          print(data['version'])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=dist/openscad_bridge-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Validate tag vs manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ "$TAG" != "${{ steps.meta.outputs.version }}" ]; then
            echo "Tag v$TAG nao bate com manifest version ${{ steps.meta.outputs.version }}"
            exit 1
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-release-zip
          path: ${{ steps.meta.outputs.zip }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.zip }}
          generate_release_notes: true
